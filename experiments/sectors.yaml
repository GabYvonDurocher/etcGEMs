# Proteome-sector allocation sweep (requires the strain to enable
# proteome_sectors). Sweeps the metabolic<->biosynthesis split at (mostly) fixed
# maintenance, plus a maintenance band, so B0 becomes an allocation trade-off
# with an interior optimum. NOTE: enable sectors in the strain first, e.g.
#   proteome_sectors: {enabled: true, ...}
kind: sweep
sensitivity:
  n_samples: 120
  seed: 1
  parameters:
    f_metab: [0.35, 0.65]     # metabolic-enzyme fraction
    f_maint: [0.05, 0.25]     # maintenance fraction (f_bio = 1 - f_metab - f_maint)
    dTopt:   [-6.0, 6.0]      # envelope knobs still available alongside
    dCp_scale: [0.5, 2.0]
  groups: []
