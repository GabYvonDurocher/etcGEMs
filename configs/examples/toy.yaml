# Offline smoke-test: e_coli_core with synthetic enzyme kinetics.
provider:
  type: toy            # toy | gecko | csv
  seed: 0
  topt_mean_offset: 8.0   # enzyme optima sit ~8 K above T0 on average
  topt_sd: 6.0            # spread of optima across enzymes
  dCp_mean: -8.0         # kJ/mol/K, MMRT curvature
  target_fraction: 0.6   # calibrate budget so growth is enzyme-limited

T0_C: 30                 # reference temperature of the kcats

temperature_grid:
  start_C: 5
  stop_C: 53
  n: 49

sensitivity:
  n_samples: 150
  seed: 1
  parameters:
    dTopt:        [-8.0, 8.0]     # shift all enzyme optima (K)
    topt_scale:   [0.6, 1.4]      # widen/compress optimum heterogeneity
    dCp_scale:    [0.5, 2.0]      # scale curvature / thermal breadth
    budget_scale: [0.7, 1.3]      # total proteome allocation
  groups: []                      # e.g. [grp0, grp1] to add per-group alloc dims

crit_frac: 0.05                   # growth fraction defining CTmin/CTmax
output_dir: outputs/toy_run
