# Strain template. To add a new strain NAME:
#   1. cp -r strains/_template strains/NAME
#   2. drop the enzyme-constrained model into strains/NAME/model/ and set
#      provider.model_file to its filename below
#   3. adjust the provider knobs / temperature grid / sensitivity block
#   4. run:  etcgem sweep --strain NAME
# The CLI injects provider.model_path (strains/NAME/model/<model_file>) and
# output_dir (strains/NAME/outputs/default, or .../dltkcat with --fits), so leave
# those out of this file.
provider:
  type: gecko                 # gecko | csv  (toy needs no model; use configs/toy.yaml)
  model_file: MODEL.xml       # <-- put this file under strains/NAME/model/
  prot_prefix: prot_
  pool_id: prot_pool
  biomass_rxn: null           # null -> auto-detect from objective
  default_Topt_offset: 7.0    # enzyme Topt above T0 (K)
  default_dCp: -12.0          # MMRT curvature (more negative = narrower TPC)
  target_fraction: null       # null -> reuse the model's own pool bound (else e.g. 0.6)
  pool_scale: 0.9             # <1 keeps the proteome pool binding across the curve

T0_C: 30                      # reference temperature of the kcats

temperature_grid:
  start_C: 8
  stop_C: 60
  n: 53

sensitivity:
  n_samples: 120
  seed: 1
  parameters:
    dTopt:        [-6.0, 6.0]   # shift all enzyme optima (K)
    topt_scale:   [0.7, 1.4]    # widen/compress optimum heterogeneity
    dCp_scale:    [0.5, 2.0]    # scale curvature / thermal breadth
    budget_scale: [0.7, 1.1]    # total proteome allocation
  groups: []                    # e.g. [grp0, grp1] to add per-group alloc dims

solver_timeout: 2
crit_frac: 0.05                 # growth fraction defining CTmin/CTmax
